name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (stable / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # pid-python is a PyO3 extension module; it is built and tested in the `python` job
      # (via maturin), so plain `cargo test` never tries to link libpython here.
      - run: cargo test --locked --workspace --exclude pid-python
      - run: cargo test --locked -p pid-core --features parallel

  lint:
    name: Rustfmt + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo clippy --locked -p pid-core --all-targets --features parallel -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # pid-python is excluded: its API is documented via README + Python docstrings, not
      # rustdoc, and rustdoc on the numpy crate's re-exports hits an upstream ICE.
      - run: cargo doc --locked --workspace --no-deps --exclude pid-python

  msrv:
    name: MSRV (1.80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.80
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --workspace

  smoke:
    name: exp0 + run-log replay smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo run -p pid-core --bin exp0 -- --seeds 1 \
            --summary-json /tmp/summary.json --runlog /tmp/run.jsonl
          cargo run -p pid-runlog --bin pid-runlog-replay -- --validate /tmp/run.jsonl

  version-coherence:
    name: Version coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Read-only guard: the Cargo workspace version and CITATION.cff version
      # must agree (there is no package.json in this repo). Catches a release
      # that bumps one but forgets the other. On a tag push it also asserts the
      # tag peels to its commit and that the tag version matches the tree.
      - name: Internal version coherence (HEAD)
        run: scripts/check-version-coherence.sh
      - name: Version coherence (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/check-version-coherence.sh "${GITHUB_REF_NAME}"

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # cargo-deny: advisories + licenses + bans + sources, gated by ./deny.toml.
      # `--all-features` so the `parallel` cabal of deps is included in the scan.
      # Fails closed: the action exits non-zero on any deny-level finding.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features --locked

  python:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install --upgrade maturin numpy pytest
      - run: maturin build --release --manifest-path crates/pid-python/Cargo.toml --out dist
      - run: pip install --no-index --find-links dist pid-core-rs
      - run: pytest crates/pid-python/tests -q
