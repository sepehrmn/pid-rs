# cargo-deny configuration. Run locally with `cargo deny check`.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# Documented transitive advisories with no clean in-lock fix (drop each when its upstream bump lands).
ignore = [
    # paste — unmaintained proc-macro (no vuln), transitive via pyo3. No upstream fix.
    "RUSTSEC-2024-0436",
    # pyo3 < 0.24.1: PyString::from_object buffer overflow (RUSTSEC-2025-0020) and
    # PyCFunction::new_closure missing Sync (RUSTSEC-2026-0177). Reachable only via the
    # optional pid-python (PyO3) binding, never pid-core. FIX: bump pyo3 to >= 0.24.1 and
    # re-test the binding, then remove these two ignores.
    "RUSTSEC-2025-0020",
    "RUSTSEC-2026-0177",
]

[licenses]
version = 2
# Permissive licenses compatible with this project's MIT OR Apache-2.0 terms.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
